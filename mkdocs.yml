site_name: Image Cloud
site_description: Interactive image galleries with animated scattered layouts and zoom effects
site_url: https://frybynite.github.io/image-cloud/
docs_dir: docs

theme:
  name: material
  features:
    - navigation.sections
    - navigation.expand
    - search.highlight

nav:
  - Home: index.md
  - Overview:
    - Parameters: parameters.md
    - Layouts: layouts.md
    - Loaders: loaders.md
    - Image Sizing: image_sizing.md
    - Configurator: configurator.md
  - Developer Guide: developer.md
  - API Reference:
    - Overview: api/README.md
    - ImageCloud: api/ImageCloud.md
    - Layouts: api/layouts.md
    - Loaders: api/loaders.md
    - Types: api/types.md
  - Examples: examples.md
  - Changelog: changelog.md
  - Backlog: backlog.md
