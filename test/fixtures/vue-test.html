<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vue Wrapper Test</title>
  <link rel="stylesheet" href="/dist/style.css">
  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
    #app { width: 100%; height: 100vh; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module">
    import { createApp, h, ref } from 'vue';
    import { ImageCloud } from '/src/vue/index.ts';

    const INITIAL_IMAGES = [
      '/test/fixtures/images/image1.jpg',
      '/test/fixtures/images/image2.jpg',
      '/test/fixtures/images/image3.jpg',
    ];

    const options = ref({
      images: INITIAL_IMAGES,
      animation: { duration: 100, queue: { enabled: true, interval: 20 } },
    });

    const galleryRef = ref(null);

    const App = {
      setup() {
        return () => h(ImageCloud, {
          options: options.value,
          ref: galleryRef,
          style: 'width:100%;height:100vh',
        });
      }
    };

    const app = createApp(App);
    app.mount('#app');

    window.unmount = () => app.unmount();
    window.updateImages = (imgs) => {
      options.value = { ...options.value, images: imgs };
    };
    // Vue auto-unwraps refs in exposed objects, so .instance is the core value directly
    window.getInstance = () => galleryRef.value?.instance ?? null;
  </script>
</body>
</html>
