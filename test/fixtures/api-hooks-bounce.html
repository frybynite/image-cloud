<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>API Hooks - Bounce Entry Test</title>
  <link rel="stylesheet" href="/dist/style.css">
  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
  </style>
</head>
<body>
  <div id="imageCloud"></div>
  <script type="module">
    import { ImageCloud } from '/dist/image-cloud.js';

    window.entryLog = [];

    window.gallery = new ImageCloud({
      container: 'imageCloud',
      loaders: [{
        static: {
          sources: [{
            urls: [
              '/test/fixtures/images/image1.jpg',
              '/test/fixtures/images/image2.jpg',
              '/test/fixtures/images/image3.jpg'
            ]
          }],
          validateUrls: false
        }
      }],
      animation: {
        duration: 200,
        queue: { enabled: true, interval: 50 },
        entry: {
          start:  { position: 'nearest-edge' },
          timing: { duration: 300 },
          easing: 'linear',
          path:   { type: 'bounce', bouncePreset: 'subtle' }
        }
      },
      on: {
        onEntryStart(ctx) {
          window.entryLog.push({
            event: 'entryStart',
            index: ctx.index,
            totalImages: ctx.totalImages,
            duration: ctx.duration,
            hasFrom: typeof ctx.from === 'object',
            hasTo:   typeof ctx.to   === 'object',
          });
        },
        onEntryProgress(ctx) {
          window.entryLog.push({
            event:    'entryProgress',
            index:    ctx.index,
            progress: ctx.progress,
            elapsed:  ctx.elapsed,
            hasCurrent: typeof ctx.current === 'object',
          });
        },
        onEntryComplete(ctx) {
          window.entryLog.push({
            event:    'entryComplete',
            index:    ctx.index,
            elapsed:  ctx.endTime - ctx.startTime,
          });
        }
      }
    });

    window.gallery.init().catch(error => {
      console.error('Gallery initialization failed:', error);
    });
  </script>
</body>
</html>
