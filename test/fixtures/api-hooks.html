<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>API Hooks Test</title>
  <link rel="stylesheet" href="/dist/style.css">
  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
  </style>
</head>
<body>
  <div id="imageCloud"></div>
  <script type="module">
    import { ImageCloud } from '/dist/image-cloud.js';

    // Track callback invocations for test assertions
    window.callbackLog = [];

    window.gallery = new ImageCloud({
      container: 'imageCloud',
      loaders: [{
        static: {
          sources: [{
            urls: [
              '/test/fixtures/images/image1.jpg',
              '/test/fixtures/images/image2.jpg',
              '/test/fixtures/images/image3.jpg'
            ]
          }],
          validateUrls: false
        }
      }],
      interaction: {
        focus: { scalePercent: 0.8, zIndex: 1000, animationDuration: 100 }
      },
      animation: {
        duration: 200,
        queue: { enabled: true, interval: 50 }
      },
      on: {
        onImageHover(ctx) {
          window.callbackLog.push({ event: 'hover', index: ctx.index, url: ctx.url });
        },
        onImageUnhover(ctx) {
          window.callbackLog.push({ event: 'unhover', index: ctx.index });
        },
        onImageFocus(ctx) {
          window.callbackLog.push({ event: 'focus', index: ctx.index });
        },
        onImageUnfocus(ctx) {
          window.callbackLog.push({ event: 'unfocus', index: ctx.index });
        }
      }
    });

    window.gallery.init().catch(error => {
      console.error('Gallery initialization failed:', error);
    });
  </script>
</body>
</html>
