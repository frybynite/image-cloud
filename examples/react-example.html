<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Cloud - React Example</title>
    <!-- Required: Image Cloud CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@frybynite/image-cloud@latest/dist/style.css">
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: system-ui, -apple-system, sans-serif;
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
        }
        #root {
            width: 100%;
            height: 80vh;
        }
    </style>
</head>
<body>
    <h1>Image Cloud - React Example</h1>
    <div id="root"></div>

    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@19",
            "react-dom/client": "https://esm.sh/react-dom@19/client",
            "react/jsx-runtime": "https://esm.sh/react@19/jsx-runtime",
            "@frybynite/image-cloud/react": "https://cdn.jsdelivr.net/npm/@frybynite/image-cloud@latest/dist/react.js",
            "@frybynite/image-cloud": "https://cdn.jsdelivr.net/npm/@frybynite/image-cloud@latest/dist/image-cloud.js"
        }
    }
    </script>

    <script type="module">
        import React from 'react';
        import { createRoot } from 'react-dom/client';
        import { ImageCloud } from '@frybynite/image-cloud/react';

        function App() {
            return React.createElement(ImageCloud, {
                style: { width: '100%', height: '100%' },
                images: [
                    'https://images.pexels.com/photos/1261728/pexels-photo-1261728.jpeg?auto=compress&w=600',
                    'https://images.pexels.com/photos/3225517/pexels-photo-3225517.jpeg?auto=compress&w=600',
                    'https://images.pexels.com/photos/1402787/pexels-photo-1402787.jpeg?auto=compress&w=600',
                    'https://images.pexels.com/photos/1366919/pexels-photo-1366919.jpeg?auto=compress&w=600',
                    'https://images.pexels.com/photos/1624496/pexels-photo-1624496.jpeg?auto=compress&w=600',
                    'https://images.pexels.com/photos/2356045/pexels-photo-2356045.jpeg?auto=compress&w=600',
                    'https://images.pexels.com/photos/1497305/pexels-photo-1497305.jpeg?auto=compress&w=600',
                    'https://images.pexels.com/photos/2437291/pexels-photo-2437291.jpeg?auto=compress&w=600'
                ],
                layout: {
                    algorithm: 'radial'
                }
            });
        }

        const root = createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
    </script>
</body>
</html>
