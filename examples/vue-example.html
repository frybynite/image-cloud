<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Cloud - Vue 3 Example</title>
    <!-- Required: Image Cloud CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@frybynite/image-cloud@latest/dist/style.css">
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: system-ui, -apple-system, sans-serif;
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
        }
        #app {
            width: 100%;
            height: 80vh;
        }
    </style>
</head>
<body>
    <h1>Image Cloud - Vue 3 Example</h1>
    <div id="app"></div>

    <script type="importmap">
    {
        "imports": {
            "vue": "https://esm.sh/vue@3",
            "@frybynite/image-cloud/vue": "https://cdn.jsdelivr.net/npm/@frybynite/image-cloud@latest/dist/vue.js",
            "@frybynite/image-cloud": "https://cdn.jsdelivr.net/npm/@frybynite/image-cloud@latest/dist/image-cloud.js"
        }
    }
    </script>

    <script type="module">
        import { createApp, h } from 'vue';
        import { ImageCloud } from '@frybynite/image-cloud/vue';

        const App = {
            setup() {
                const options = {
                    images: [
                        'https://images.pexels.com/photos/1261728/pexels-photo-1261728.jpeg?auto=compress&w=600',
                        'https://images.pexels.com/photos/3225517/pexels-photo-3225517.jpeg?auto=compress&w=600',
                        'https://images.pexels.com/photos/1402787/pexels-photo-1402787.jpeg?auto=compress&w=600',
                        'https://images.pexels.com/photos/1366919/pexels-photo-1366919.jpeg?auto=compress&w=600',
                        'https://images.pexels.com/photos/1624496/pexels-photo-1624496.jpeg?auto=compress&w=600',
                        'https://images.pexels.com/photos/2356045/pexels-photo-2356045.jpeg?auto=compress&w=600',
                        'https://images.pexels.com/photos/1497305/pexels-photo-1497305.jpeg?auto=compress&w=600',
                        'https://images.pexels.com/photos/2437291/pexels-photo-2437291.jpeg?auto=compress&w=600'
                    ],
                    layout: {
                        algorithm: 'radial'
                    }
                };

                return () => h(ImageCloud, {
                    options,
                    style: 'width:100%;height:100%'
                });
            }
        };

        createApp(App).mount('#app');
    </script>
</body>
</html>
